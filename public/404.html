<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Capital Royal Services</title>
    <script>
      (function () {
        var base = '/CapitalRoyalServices';
        var path = window.location.pathname.replace(base, '') || '/';
        window.location.replace(base + '/?redirect=' + encodeURIComponent(path + window.location.search + window.location.hash));
      })();
    </script>
  </head>
  <body>
    <p>Redirecting to Capital Royal Services...</p>
  </body>
</html>
